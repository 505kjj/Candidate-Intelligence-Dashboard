github_repo: "https://github.com/505kjj/Candidate-Intelligence-Dashboard"
# Runnable sandbox (Section 10.5): runs the ranker end-to-end on a <=100-candidate
# sample, CPU-only, no network/LLM. Colab notebook (zero setup) is the primary link;
# a `docker build`/`docker run` recipe is in the README "Sandbox / Reproduction" section.
sandbox_link: "https://colab.research.google.com/github/505kjj/Candidate-Intelligence-Dashboard/blob/master/sandbox/run_sandbox.ipynb"
demo_dashboard_link: "https://frontend-pink-nine-73.vercel.app/"
reproduce_command: "python backend/rank.py --candidates ./data/candidates.jsonl --out ./outputs/submission.csv --json ./outputs/top_candidates.json"
sandbox_command: "docker build -t candidate-ranker . && docker run --rm candidate-ranker"

compute:
  platform: "Local CPU machine"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.11"
  os: "Windows 11 / Linux compatible"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

ai_tools_used:
  - "ChatGPT"
  - "Claude"

ai_usage_summary: |
  Used AI assistance to scaffold and review code, documentation, and UI structure.
  No hosted AI APIs are called during ranking and no candidate data is sent to an
  external model by the submitted ranker.

methodology_summary: |
  CPU-only explainable hybrid ranker for a Senior AI / Founding AI Engineer role.
  It combines TF-IDF semantic similarity with explicit scoring for career
  evidence, core skills, seniority, product-company fit, behavioral availability,
  logistics, and trap detection. The system rewards career descriptions showing
  production retrieval, ranking, embeddings, vector search, ML infrastructure,
  evaluation metrics, and product engineering, while penalizing keyword-stuffed
  or non-technical profiles where AI skills are unsupported by work history.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true

demo_dashboard_link: "https://frontend-pink-nine-73.vercel.app/"
dashboard_page: "https://frontend-pink-nine-73.vercel.app/dashboard"
sandbox_link: "https://colab.research.google.com/github/505kjj/Candidate-Intelligence-Dashboard/blob/master/sandbox/run_sandbox.ipynb"

reproduce_command: "python backend/rank.py --candidates ./data/candidates.jsonl --out ./outputs/submission.csv --json ./outputs/top_candidates.json"
validate_command: "python validate_submission.py ./outputs/submission.csv"
sandbox_command: "docker build -t candidate-ranker . && docker run --rm candidate-ranker"

generated_outputs:
  - "submission.csv"
  - "outputs/submission.csv"
  - "outputs/top_candidates.json"
  - "frontend/public/generated/submission.csv"
  - "frontend/public/generated/top_candidates.json"

vercel_is_demo_only: true
vercel_note: |
  The Vercel site is a display-only dashboard/demo.
  It serves precomputed generated outputs and does not run the Python ranking engine.
  The ranker runs only via backend/rank.py locally or in Docker.

no_hosted_llm: true
no_hosted_llm_declaration: |
  No hosted LLM/API is used during scoring or ranking.
  No candidate data is sent to OpenAI, Anthropic/Claude, Google Gemini, Cohere, Groq, Together, HuggingFace Inference, or any external model service.
  Semantic similarity is local scikit-learn TF-IDF.
  Career-evidence, logistics, behavioral, and trap detection are local deterministic heuristics.

scoring_formula: |
  Final Score =
  0.25 semantic match
  + 0.25 career evidence
  + 0.15 core skill fit
  + 0.10 seniority fit
  + 0.08 product/company fit
  + 0.10 behavioral signal fit
  + 0.07 logistics fit
  - trap/data-quality penalties

compute:
  platform: "Local CPU machine"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.11"
  os: "Windows 11 / Linux compatible"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

ai_tools_used:
  - "ChatGPT"
  - "Claude"

ai_usage_summary: |
  Used AI assistance to scaffold and review code, documentation, and UI structure.
  No hosted AI APIs are called during ranking and no candidate data is sent to an external model by the submitted ranker.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
  no_hosted_llm_used_in_scoring: true
  ranking_is_cpu_only: true
